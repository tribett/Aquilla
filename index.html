<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"%3E%3Crect width="16" height="16" fill="%2314110c"/%3E%3Cpath d="M8 2 12 8 8 14 4 8Z" fill="%23e0a93a"/%3E%3C/svg%3E' />
    <title>Aquilla</title>
  </head>
  <body data-game="aquilla">
    <main class="page-shell" aria-labelledby="aquilla-title">
      <section class="story-panel" aria-label="Aquilla prototype introduction">
        <h1 id="aquilla-title">Aquilla</h1>
        <div class="story-copy">
          <p class="tagline">Gather. Guard. Restore.</p>
          <p class="flavor">Mercy leads the lost home; grace is received, not earned.</p>
        </div>
      </section>
      <section class="prototype-shell" aria-label="Playable prototype">
        <aside class="controls-panel" aria-label="Controls">
          <h2>Controls</h2>
          <ul class="controls-list">
            <li><span class="control-copy">Arrow keys</span><span>move Aquilla</span></li>
            <li><span class="control-copy">H herd</span><span>guide sheep</span></li>
            <li><span class="control-copy">W water</span><span>restore spring</span></li>
            <li><span class="control-copy">D distract</span><span>draw guardian</span></li>
            <li><span class="control-copy">G calm</span><span>lower hostility</span></li>
            <li><span class="control-copy">R restore fold</span><span>bring the lost home</span></li>
          </ul>
        </aside>
        <div id="game-root" aria-label="Aquilla game canvas"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
